<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="package" href="package.json">
<meta name="theme-color" content="#3f51b5">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Score Yams</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
}

h1{
margin-top:20px;
}

#controls{
margin:20px;
}

button{
padding:10px 15px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

table{
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th,td{
border:1px solid #ddd;
padding:10px;
min-width:90px;
}

th{
background:#3f51b5;
color:white;
}

td{
cursor:pointer;
}

td.used{
background:#c8e6c9;
font-weight:bold;
}

.total{
background:#eee;
font-weight:bold;
cursor:default;
}

</style>

</head>
<body>

<h1>Score Yams</h1>

<div id="controls">
<input id="playerName" placeholder="Nom du joueur">
<button type="button" onclick="addPlayer()">Ajouter joueur</button>
</div>

<table id="scoreTable">

<thead>
<tr>
<th>Combinaison</th>
</tr>
</thead>

<tbody id="scoreBody"></tbody>

<tfoot>
<tr id="totals">
<td class="total">Total</td>
</tr>
</tfoot>

</table>

<script>

const upperSection = [
"As",
"Deux",
"Trois",
"Quatre",
"Cinq",
"Six"
];

const lowerSection = [
"Brelan",
"Carré",
"Full",
"Petite Suite",
"Grande Suite",
"Yams",
"Chance"
];

// scores automatiques
const fixedScores = {
"Full":25,
"Petite Suite":30,
"Grande Suite":40,
"Yams":50
};

let players=[];


function addPlayer(){

const input=document.getElementById("playerName");
const name=input.value.trim();

if(!name) return;

players.push({name:name});

input.value="";

renderTable();

}


function renderTable(){

const headRow=document.querySelector("#scoreTable thead tr");
headRow.innerHTML="<th>Combinaison</th>";

players.forEach(p=>{
let th=document.createElement("th");
th.textContent=p.name;
headRow.appendChild(th);
});

const body=document.getElementById("scoreBody");
body.innerHTML="";


upperSection.forEach((combo,rowIndex)=>{

let row=document.createElement("tr");

let name=document.createElement("td");
name.textContent=combo;
row.appendChild(name);

players.forEach((p,i)=>{

let cell=document.createElement("td");

cell.onclick=()=>toggleCell(cell,i,combo);

row.appendChild(cell);

});

body.appendChild(row);

});


// sous total

let subtotalRow=document.createElement("tr");

let subtotalName=document.createElement("td");
subtotalName.textContent="Sous-total";
subtotalName.className="total";

subtotalRow.appendChild(subtotalName);

players.forEach(()=>{

let td=document.createElement("td");
td.className="total upperTotal";
td.textContent="0";

subtotalRow.appendChild(td);

});

body.appendChild(subtotalRow);


// bonus

let bonusRow=document.createElement("tr");

let bonusName=document.createElement("td");
bonusName.textContent="Bonus (≥63)";
bonusName.className="total";

bonusRow.appendChild(bonusName);

players.forEach(()=>{

let td=document.createElement("td");
td.className="total bonus";
td.textContent="0";

bonusRow.appendChild(td);

});

body.appendChild(bonusRow);


// section basse

lowerSection.forEach((combo)=>{

let row=document.createElement("tr");

let name=document.createElement("td");
name.textContent=combo;
row.appendChild(name);

players.forEach((p,i)=>{

let cell=document.createElement("td");

cell.onclick=()=>toggleCell(cell,i,combo);

row.appendChild(cell);

});

body.appendChild(row);

});


// total final

const totalRow=document.getElementById("totals");
totalRow.innerHTML="<td class='total'>Total</td>";

players.forEach(()=>{

let td=document.createElement("td");
td.className="total";
td.textContent="0";

totalRow.appendChild(td);

});

}


function toggleCell(cell,playerIndex,combo){

let currentValue = cell.textContent;
let value;

// si score fixe
if(fixedScores[combo] !== undefined){

// si la cellule est vide -> score automatique
if(currentValue === ""){
value = fixedScores[combo];
}else{
// sinon permettre modification
value = prompt("Modifier le score :", currentValue);
if(value===null) return;
value = parseInt(value);
if(isNaN(value)) return;
}

}else{

value = prompt("Score obtenu :", currentValue);

if(value===null) return;

value=parseInt(value);

if(isNaN(value)) return;

}

cell.textContent=value;

cell.classList.add("used");

updateTotals(playerIndex);

checkGameEnd();

}


function updateTotals(playerIndex){

let col=playerIndex+1;

let rows=document.querySelectorAll("#scoreBody tr");

let upperTotal=0;
let grandTotal=0;


// As -> Six

for(let i=0;i<6;i++){

let v=parseInt(rows[i].children[col].textContent);

if(!isNaN(v)) upperTotal+=v;

}

rows[6].children[col].textContent=upperTotal;


// bonus

let bonus=upperTotal>=63?35:0;

rows[7].children[col].textContent=bonus;


// total général

rows.forEach((row,index)=>{

if(index===6||index===7) return;

let v=parseInt(row.children[col].textContent);

if(!isNaN(v)) grandTotal+=v;

});

grandTotal+=bonus;

document.getElementById("totals").children[col].textContent=grandTotal;

}

function checkGameEnd(){

let rows=document.querySelectorAll("#scoreBody tr");
let playableRows=[];

// lignes jouables (on ignore sous total et bonus)
rows.forEach((row,index)=>{
if(index!==6 && index!==7){
playableRows.push(row);
}
});

let allFilled=true;

playableRows.forEach(row=>{
for(let i=1;i<row.children.length;i++){
if(row.children[i].textContent===""){
allFilled=false;
}
}
});

if(!allFilled) return;


// récupérer les scores finaux

let totals=document.querySelectorAll("#totals td");

let bestScore=-1;
let winner="";
let tie=false;

players.forEach((player,i)=>{

let score=parseInt(totals[i+1].textContent);

if(score>bestScore){
bestScore=score;
winner=player.name;
tie=false;
}
else if(score===bestScore){
tie=true;
}

});

setTimeout(()=>{

if(tie){
alert("Égalité ! Plusieurs joueurs ont " + bestScore + " points !");
}else{
alert("🏆 Le gagnant est " + winner + " avec " + bestScore + " points !");
}

},200);

}

</script>

</body>
</html>
