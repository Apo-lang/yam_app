<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="package.json">
<meta name="theme-color" content="#3f51b5">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Score Yams</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
}

h1{
margin-top:20px;
}

#controls{
margin:20px;
}

button{
padding:10px 15px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

table{
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th,td{
border:1px solid #ddd;
padding:10px;
min-width:90px;
}

th{
background:#3f51b5;
color:white;
}

td{
cursor:pointer;
}

td.used{
background:#c8e6c9;
font-weight:bold;
}

.total{
background:#eee;
font-weight:bold;
cursor:default;
}

</style>

</head>
<body>

<h1>Score Yams</h1>

<div id="controls">
<input id="playerName" placeholder="Nom du joueur">
<button type="button" onclick="addPlayer()">Ajouter joueur</button>
</div>

<table id="scoreTable">

<thead>
<tr>
<th>Combinaison</th>
</tr>
</thead>

<tbody id="scoreBody"></tbody>

<tfoot>
<tr id="totals">
<td class="total">Total</td>
</tr>
</tfoot>

</table>

<script>

const upperSection = [
"As",
"Deux",
"Trois",
"Quatre",
"Cinq",
"Six"
];

const lowerSection = [
"Brelan",
"Carré",
"Full",
"Petite Suite",
"Grande Suite",
"Yams",
"Chance"
];

// scores automatiques
const fixedScores = {
"Full":25,
"Petite Suite":30,
"Grande Suite":40,
"Yams":50
};

let players=[];


function addPlayer(){

const input=document.getElementById("playerName");
const name=input.value.trim();

if(!name) return;

players.push({name:name});

input.value="";

renderTable();

}

function createSelect(combo, playerIndex){

let select=document.createElement("select");

let values=[];

if(combo==="As"){
values=[0,1,2,3,4,5,6];
}

else if(combo==="Deux"){
for(let i=0;i<=10;i+=2) values.push(i);
}

else if(combo==="Trois"){
for(let i=0;i<=15;i+=3) values.push(i);
}

else if(combo==="Quatre"){
for(let i=0;i<=20;i+=4) values.push(i);
}

else if(combo==="Cinq"){
for(let i=0;i<=25;i+=5) values.push(i);
}

else if(combo==="Six"){
for(let i=0;i<=30;i+=6) values.push(i);
}

else if(combo==="Brelan" || combo==="Carré" || combo==="Chance"){
for(let i=0;i<=30;i++) values.push(i);
}



// remplir la liste
let defaultOption = document.createElement("option");
defaultOption.value = "";
defaultOption.textContent = "--";
select.appendChild(defaultOption);

// Puis toutes les valeurs
values.forEach(v=>{
  let option=document.createElement("option");
  option.value=v;
  option.textContent=v;
  select.appendChild(option);
});

// mettre la valeur initiale sur l'option vide
select.value = "";

return select;
}




function renderTable(){

const headRow=document.querySelector("#scoreTable thead tr");
headRow.innerHTML="<th>Combinaison</th>";

players.forEach(p=>{
let th=document.createElement("th");
th.textContent=p.name;
headRow.appendChild(th);
});

const body=document.getElementById("scoreBody");
body.innerHTML="";


upperSection.forEach((combo,rowIndex)=>{

let row=document.createElement("tr");

let name=document.createElement("td");
name.textContent=combo;
row.appendChild(name);

players.forEach((p,i)=>{

let cell=document.createElement("td");

// combinaisons avec score fixe (clic)
if(fixedScores[combo] !== undefined){

cell.onclick=()=>{
cell.textContent=fixedScores[combo];
cell.classList.add("used");
updateTotals(i);
checkGameEnd();
};

}
else{

// combinaisons avec liste déroulante
let select=createSelect(combo,i);
cell.appendChild(select);

}

row.appendChild(cell);

});

body.appendChild(row);

});


// sous total

let subtotalRow=document.createElement("tr");

let subtotalName=document.createElement("td");
subtotalName.textContent="Sous-total";
subtotalName.className="total";

subtotalRow.appendChild(subtotalName);

players.forEach(()=>{

let td=document.createElement("td");
td.className="total upperTotal";
td.textContent="0";

subtotalRow.appendChild(td);

});

body.appendChild(subtotalRow);


// bonus

let bonusRow=document.createElement("tr");

let bonusName=document.createElement("td");
bonusName.textContent="Bonus (≥63)";
bonusName.className="total";

bonusRow.appendChild(bonusName);

players.forEach(()=>{

let td=document.createElement("td");
td.className="total bonus";
td.textContent="0";

bonusRow.appendChild(td);

});

body.appendChild(bonusRow);


// section basse

lowerSection.forEach((combo)=>{

let row=document.createElement("tr");

let name=document.createElement("td");
name.textContent=combo;
row.appendChild(name);

players.forEach((p,i)=>{

let cell=document.createElement("td");

// scores automatiques
if(fixedScores[combo] !== undefined){

cell.onclick = () => {
  if(cell.dataset.played) return; // bloque si déjà joué
  cell.textContent = fixedScores[combo];
  cell.dataset.played = "true";  // <- marque la cellule comme jouée
  cell.classList.add("used");
  updateTotals(i);
  checkGameEnd();
};

}
else{

// liste déroulante pour brelan, carré, chance
let select=createSelect(combo,i);
cell.appendChild(select);

}

row.appendChild(cell);

});

body.appendChild(row);

});


// total final

const totalRow=document.getElementById("totals");
totalRow.innerHTML="<td class='total'>Total</td>";

players.forEach(()=>{

let td=document.createElement("td");
td.className="total";
td.textContent="0";

totalRow.appendChild(td);

});

}


function updateTotals(playerIndex){

let col=playerIndex+1;

let rows=document.querySelectorAll("#scoreBody tr");

let upperTotal=0;
let grandTotal=0;


// As -> Six

for(let i=0;i<6;i++){

let cell = rows[i].children[col];
let select = cell.querySelector("select");

let v = 0;

if(select && select.value !== ""){
v = parseInt(select.value);
}

upperTotal += v;

}

rows[6].children[col].textContent = upperTotal;


// bonus

let bonus = upperTotal >= 63 ? 35 : 0;

rows[7].children[col].textContent = bonus;


// total général

rows.forEach((row,index)=>{

if(index===6||index===7) return;

let cell = row.children[col];
let select = cell.querySelector("select");

let v;

if(select){
v = parseInt(select.value);
}else{
v = parseInt(cell.textContent);
}

if(!isNaN(v)) grandTotal += v;

});

grandTotal+=bonus;

document.getElementById("totals").children[col].textContent=grandTotal;

}

function checkGameEnd() {
  let rows = document.querySelectorAll("#scoreBody tr");

  // lignes jouables (on ignore sous-total et bonus)
  let playableRows = Array.from(rows).filter((row, index) => index !== 6 && index !== 7);

  let allFilled = true;

  playableRows.forEach(row => {
    for (let i = 1; i < row.children.length; i++) {
      let cell = row.children[i];
      let select = cell.querySelector("select");

      if (select) {
        // cellule avec menu déroulant
        if (select.value === "") {
          allFilled = false;
          break;
        }
      } else {
        // cellule automatique (Full, Yams, Suites)
        if (!cell.dataset.played){
  allFilled = false;
        }
      }
    }
    if (!allFilled) return; // si une cellule n'est pas remplie, stop
  });

  if (!allFilled) return; // aucune action si pas toutes les cellules remplies

  // récupérer les scores finaux
  let totals = document.querySelectorAll("#totals td");

  let bestScore = -1;
  let winner = "";
  let tie = false;

  players.forEach((player, i) => {
    let score = parseInt(totals[i + 1].textContent);

    if (score > bestScore) {
      bestScore = score;
      winner = player.name;
      tie = false;
    } else if (score === bestScore) {
      tie = true;
    }
  });

  setTimeout(() => {
    if (tie) {
      alert("Égalité ! Plusieurs joueurs ont " + bestScore + " points !");
    } else {
      alert("🏆 Le gagnant est " + winner + " avec " + bestScore + " points !");
    }
  }, 200);
}


</script>

</body>
</html>
